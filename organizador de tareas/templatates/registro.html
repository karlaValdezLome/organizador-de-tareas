<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - NutriApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/NutriAppp/../static/css/styles.css">

</head>

<body class="bg-secondary">
    <header class="bg-dark text-light py-3 shadow">
        <div class=" container d-flex justify-content-between align-items-center">

                <a href="/iniciodesecion.html" class="btn btn-warning ms-3">Iniciar Sesión</a>
            </nav>
        </div>
    </header>



    <div class="container">
      <p></p>
        <div class="row justify-content-center card shadow-sm ">
            <div class="col-xl-10">
                <div class="registration-card">
                    <div class="card-body p-4 p-md-5">





                        <form method="post" id="registro" action="/registrar">
  
                            <div class="mb-4">
                                <h4 class="section-title">Información Personal</h4>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="nombre" class="form-label fw-medium">Nombre</label>
                                        <input type="text" class="form-control form-control-custom" id="nombre" name="nombre" 
                                               placeholder="Ej: Juan" required minlength="2" maxlength="20" 
                                               value="">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="apellido" class="form-label fw-medium">Apellido</label>
                                        <input type="text" class="form-control form-control-custom" id="apellido" name="apellido"
                                            placeholder="Ej: Pérez" required minlength="2" maxlength="20"
                                            value="">
                                    </div>
                                </div>
                                
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label for="correo" class="form-label fw-medium">Correo Electrónico</label>
                                        <input type="email" class="form-control form-control-custom" id="correo" name="correo"
                                            placeholder="Ej: juan@correo.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                                            required value="">
                                        <div class="form-text">Usaremos este correo para contactarte y enviar recordatorios.</div>
                                    </div>
                                    <div class="col-md-6">
                                        <label for="genero" class="form-label fw-medium">Género</label>
                                        <select class="form-select form-control-custom" id="genero" name="genero" required>
                                            <option value="" selected disabled>Selecciona tu Género</option>
                                            <option value="hombre">Hombre</option>
                                            <option value="mujer">Mujer</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-medium">Fecha de Nacimiento</label>
                                    <div class="row g-2">
                                        <div class="col-4">
                                            <input type="number" class="form-control form-control-custom" id="dia" name="dia" 
                                                   min="1" max="31" placeholder="DD" value="{{ request.form.get('dia', '')}}">
                                            <div class="form-text small">Día</div>
                                        </div>
                                        <div class="col-4">
                                            <input type="number" class="form-control form-control-custom" id="mes" name="mes" 
                                                   min="1" max="12" placeholder="MM" value="{{ request.form.get('mes', '')}}">
                                            <div class="form-text small">Mes</div>
                                        </div>
                                        <div class="col-4">
                                            <input type="number" class="form-control form-control-custom" id="year" name="year" 
                                                   min="1900" max="2025" placeholder="AAAA" value="{{ request.form.get('year', '')}}">
                                            <div class="form-text small">Año</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

 

</body>
</html>
